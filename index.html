<html lang="zh-CN">

<meta charset="UTF-8">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    background: #f0f2f5;
    color: #333;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a3a5c 0%, #1f4d7a 50%, #1a3a5c 100%);
    color: #fff;
    padding: 24px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(255,255,255,0.03) 0%, transparent 70%);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }
  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 1px;
    position: relative;
    z-index: 1;
  }
  .header .subtitle {
    font-size: 13px;
    opacity: 0.85;
    margin-top: 6px;
    position: relative;
    z-index: 1;
  }

  /* Stats bar */
  .stats-bar {
    display: flex;
    justify-content: space-around;
    background: #fff;
    margin: -10px 12px 0;
    border-radius: 12px;
    padding: 16px 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    position: relative;
    z-index: 2;
  }
  .stat-item {
    text-align: center;
    flex: 1;
  }
  .stat-num {
    font-size: 26px;
    font-weight: 700;
    color: #1a3a5c;
  }
  .stat-num.green { color: #2d8b46; }
  .stat-num.orange { color: #e67e22; }
  .stat-label {
    font-size: 11px;
    color: #888;
    margin-top: 2px;
  }

  /* Main content */
  .container {
    padding: 16px 12px 40px;
    max-width: 600px;
    margin: 0 auto;
  }

  /* Project card */
  .card {
    background: #fff;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 14px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    border-left: 4px solid #d0d5dd;
    transition: all 0.2s ease;
    position: relative;
  }
  .card:active {
    transform: scale(0.985);
    box-shadow: 0 2px 16px rgba(0,0,0,0.12);
  }
  .card.status-done     { border-left-color: #2d8b46; }
  .card.status-active   { border-left-color: #2672b8; }
  .card.status-pending  { border-left-color: #e67e22; }
  .card.status-stalled  { border-left-color: #c0392b; }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 10px;
  }
  .card-no {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 6px;
    background: #1a3a5c;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    flex-shrink: 0;
    margin-right: 10px;
  }
  .card-title-area {
    flex: 1;
    min-width: 0;
  }
  .card-title {
    font-size: 16px;
    font-weight: 700;
    color: #1a1a1a;
    word-break: break-all;
  }
  .card-unit {
    display: inline-block;
    font-size: 11px;
    color: #666;
    background: #f0f4f8;
    border-radius: 4px;
    padding: 2px 8px;
    margin-top: 4px;
  }

  /* Status tag */
  .status-tag {
    display: inline-flex;
    align-items: center;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    flex-shrink: 0;
    font-weight: 600;
    white-space: nowrap;
  }
  .status-tag.done     { background: #e8f5e9; color: #2d8b46; }
  .status-tag.active   { background: #e3f0fb; color: #1a6cb8; }
  .status-tag.pending  { background: #fef3e8; color: #cc7a1a; }
  .status-tag.stalled  { background: #fdecea; color: #b8433a; }

  /* Progress bar */
  .progress-section {
    margin: 12px 0;
  }
  .progress-header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: #888;
    margin-bottom: 4px;
  }
  .progress-pct {
    font-weight: 700;
    color: #1a3a5c;
  }
  .progress-bar {
    height: 8px;
    background: #e9edf2;
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .progress-fill.high   { background: linear-gradient(90deg, #2d8b46, #3cb054); }
  .progress-fill.medium { background: linear-gradient(90deg, #2672b8, #4a90d9); }
  .progress-fill.low    { background: linear-gradient(90deg, #e67e22, #f0a050); }
  .progress-fill.minimal{ background: linear-gradient(90deg, #c0392b, #e06050); }

  /* Info rows */
  .info-block {
    background: #f8f9fb;
    border-radius: 8px;
    padding: 12px;
    margin-top: 10px;
  }
  .info-row {
    margin-bottom: 8px;
    font-size: 13px;
    line-height: 1.6;
  }
  .info-row:last-child { margin-bottom: 0; }
  .info-label {
    font-weight: 700;
    color: #1a3a5c;
    display: inline;
  }
  .info-text {
    color: #555;
  }

  /* Deadline */
  .deadline-row {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: #888;
    margin-top: 10px;
    padding-top: 10px;
    border-top: 1px dashed #e0e4e8;
  }
  .deadline-icon {
    width: 14px;
    height: 14px;
  }

  /* Footer */
  .footer {
    text-align: center;
    color: #aaa;
    font-size: 12px;
    padding: 20px 0 30px;
  }
  .footer .disclaimer {
    color: #c0392b;
    font-weight: 600;
    margin-top: 4px;
  }

  /* Expand/collapse for long content */
  .content-preview {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
  }
  .content-preview.open {
    max-height: 600px;
  }
  .expand-btn {
    display: block;
    width: 100%;
    text-align: center;
    color: #2672b8;
    font-size: 13px;
    padding: 8px 0 0;
    cursor: pointer;
    background: none;
    border: none;
    -webkit-tap-highlight-color: transparent;
  }
  .expand-btn:active { opacity: 0.6; }

  /* Timeline mini visualization */
  .timeline-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
    vertical-align: middle;
  }
  .timeline-dot.green { background: #2d8b46; }
  .timeline-dot.blue  { background: #2672b8; }
  .timeline-dot.orange { background: #e67e22; }

  .update-time {
    text-align: right;
    font-size: 11px;
    color: #aaa;
    margin-bottom: 12px;
  }

  @media (min-width: 480px) {
    .container { padding: 20px 16px 48px; }
    .card { padding: 22px; }
    .card-title { font-size: 17px; }
    .header h1 { font-size: 24px; }
  }
</style>
</head>

          <span>完成时限：<strong>${p.deadline}</strong></span>
          <span style="margin-left:auto;font-size:11px;color:#999;">${p.status}</span>
        </div>
      </div>
    `;

    container.insertAdjacentHTML('beforeend', cardHtml);
  });

  document.getElementById('doneCount').textContent = doneCount;
  document.getElementById('pendingCount').textContent = pendingCount;
  document.getElementById('totalInvest').textContent = '4367';
}

renderProjects();
</script>
